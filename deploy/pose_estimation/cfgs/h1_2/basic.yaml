robot:
  name: h1_2
  asset_path: urdf/h1_2/h1_2_simp.urdf
  scale: 1.0
control:
  control_freq: 50
  kp: 30.0
  kd: 2.0
  armature: 0.0
  damping: 0.0
learning:
  num_iterations: 3
  num_samples: 4
  num_logpoints: 10
  command:
    lin_vel_x_range:
    - -0.5
    - 1.0
    lin_vel_y_range:
    - -0.5
    - 0.5
    ang_vel_range:
    - -1.0
    - 1.0
pose:
  base_reset_pos:
  - 0.0
  - 0.0
  - 1.1
  base_reset_quat:
  - 1.0
  - 0.0
  - 0.0
  - 0.0
  reset_joint_angles:
    left_ankle_pitch_joint: -0.20
    left_ankle_roll_joint: 0.
    left_hip_pitch_joint: -0.20
    left_hip_roll_joint: 0.
    left_hip_yaw_joint: 0.
    left_knee_joint: 0.4
    right_ankle_pitch_joint: -0.20
    right_ankle_roll_joint: 0.
    right_hip_pitch_joint: -0.20
    right_hip_roll_joint: 0.
    right_hip_yaw_joint: 0.
    right_knee_joint: 0.4