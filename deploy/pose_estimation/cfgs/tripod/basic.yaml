robot:
  name: tripod
  asset_path: urdf/tripod/tripod.urdf
  scale: 1.0
control:
  control_freq: 50
  kp: 30.0
  kd: 3.5
  armature: 0.05
  damping: 0.0
learning:
  num_iterations: 3
  num_samples: 4
  num_logpoints: 10
  command:
    lin_vel_x_range:
    - -0.5
    - 1.0
    lin_vel_y_range:
    - -0.5
    - 0.5
    ang_vel_range:
    - -0.5
    - 0.5